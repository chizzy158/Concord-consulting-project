version: 0.2

# Concord Consulting — AWS CodeBuild buildspec
# Phases: install → pre_build (tests + ECR login) → build (Docker) → post_build (push + deploy)

env:
  variables:
    AWS_REGION: "eu-west-1"
    ECR_REPO: "concord-consulting-web"
    IMAGE_TAG: "latest"
  parameter-store:
    DB_HOST: "/concordconsulting/prod/DB_HOST"
    DB_USER: "/concordconsulting/prod/DB_USER"
    DB_PASS: "/concordconsulting/prod/DB_PASS"
    DB_NAME: "/concordconsulting/prod/DB_NAME"

phases:

  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Concord Consulting - Installing Node dependencies..."
      - npm ci

  pre_build:
    commands:
      - echo "Running Concord Consulting health tests..."
      - npm test
      - echo "Logging in to Amazon ECR..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE_URI="$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
      - echo "ECR login successful"

  build:
    commands:
      - echo "Building Concord Consulting Docker image..."
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $IMAGE_URI
      - echo "Docker build complete"

  post_build:
    commands:
      - echo "Pushing Concord Consulting image to ECR..."
      - docker push $IMAGE_URI
      - echo "Image pushed successfully"
      - echo "Deploying to EC2 via SSM with CloudWatch logging..."
      - aws ssm send-command --region $AWS_REGION --instance-ids $EC2_INSTANCE_ID --document-name "AWS-RunShellScript" --parameters commands=["aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY","docker pull $IMAGE_URI","docker stop concord-consulting-web || true","docker rm concord-consulting-web || true","docker run -d -p 80:3000 --restart unless-stopped --name concord-consulting-web --log-driver=awslogs --log-opt awslogs-region=$AWS_REGION --log-opt awslogs-group=/concord-consulting/app --log-opt awslogs-stream=ec2-container --log-opt awslogs-create-group=true -e DB_HOST=$DB_HOST -e DB_USER=$DB_USER -e DB_PASS=$DB_PASS -e DB_NAME=$DB_NAME $IMAGE_URI"] --comment "Concord Consulting CodePipeline deploy"
      - echo "Deployment command sent successfully"

artifacts:
  files:
    - "**/*"
  discard-paths: no
